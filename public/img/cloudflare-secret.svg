<svg xmlns="http://www.w3.org/2000/svg" width="640" height="430" viewBox="0 0 640 430" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="640" height="430" rx="14" fill="#0b1120"/>

  <!-- Dialog-Karte -->
  <rect x="24" y="24" width="420" height="382" rx="12" fill="#111c33" stroke="#2b3b5e" stroke-width="1.5"/>
  <text x="44" y="58" fill="#f2f5fa" font-size="17" font-weight="700">Variable hinzufügen</text>
  <text x="44" y="76" fill="#8aa0c6" font-size="12">Settings → Variables and Secrets → Add</text>

  <!-- Feld: Typ (Secret) -->
  <text x="44" y="110" fill="#9be7b4" font-size="12.5" font-weight="700">Typ / Type</text>
  <rect x="44" y="118" width="380" height="40" rx="9" fill="#0f2a1b" stroke="#34c759" stroke-width="2"/>
  <text x="58" y="143" fill="#9be7b4" font-size="14" font-weight="700">Secret  (verschlüsselt)</text>
  <text x="404" y="143" fill="#9be7b4" font-size="13">&#9662;</text>

  <!-- Feld: Variablenname -->
  <text x="44" y="190" fill="#9be7b4" font-size="12.5" font-weight="700">Variablenname / Variable name</text>
  <rect x="44" y="198" width="380" height="42" rx="9" fill="#0f2a1b" stroke="#34c759" stroke-width="2"/>
  <text x="58" y="225" fill="#9be7b4" font-size="15" font-weight="700" font-family="monospace">SYNC_SECRET</text>

  <!-- Feld: Wert -->
  <text x="44" y="278" fill="#8aa0c6" font-size="12.5" font-weight="600">Wert / Value</text>
  <rect x="44" y="286" width="380" height="40" rx="9" fill="#0b1120" stroke="#2b3b5e"/>
  <text x="58" y="311" fill="#f2f5fa" font-size="15" font-family="monospace">••••••••••••••••</text>

  <!-- Button -->
  <rect x="284" y="350" width="140" height="40" rx="9" fill="#3b82f6"/>
  <text x="354" y="375" fill="#ffffff" font-size="14" font-weight="700" text-anchor="middle">Bereitstellen</text>

  <!-- Callout: Typ -->
  <path d="M424 138 L470 138" stroke="#34c759" stroke-width="2" fill="none"/>
  <polygon points="424,138 434,133 434,143" fill="#34c759"/>
  <rect x="470" y="115" width="150" height="48" rx="9" fill="#10241a" stroke="#34c759" stroke-width="1.5"/>
  <text x="482" y="135" fill="#9be7b4" font-size="11.5" font-weight="700">Typ = Secret,</text>
  <text x="482" y="151" fill="#9be7b4" font-size="11.5" font-weight="700">nicht „Text"</text>

  <!-- Callout: Wert -->
  <path d="M424 306 L470 306" stroke="#8aa0c6" stroke-width="2" fill="none"/>
  <polygon points="424,306 434,301 434,311" fill="#8aa0c6"/>
  <rect x="470" y="283" width="150" height="48" rx="9" fill="#16243d" stroke="#2b3b5e" stroke-width="1.5"/>
  <text x="482" y="303" fill="#c7d4ea" font-size="11.5">In der App kopiertes</text>
  <text x="482" y="319" fill="#c7d4ea" font-size="11.5">Secret einfügen</text>
</svg>
