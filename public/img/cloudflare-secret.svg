<svg xmlns="http://www.w3.org/2000/svg" width="600" height="640" viewBox="0 0 600 640" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="600" height="640" rx="16" fill="#0b1120"/>
  <rect x="16" y="16" width="568" height="608" rx="18" fill="#18243d" stroke="#3a4d75" stroke-width="2"/>

  <text x="44" y="70" fill="#ffffff" font-size="34" font-weight="800">Variable hinzufügen</text>
  <text x="44" y="100" fill="#c3d2ee" font-size="21">Settings → Variables and Secrets → Add</text>

  <!-- Typ (HIGHLIGHT) -->
  <text x="44" y="146" fill="#7df09b" font-size="22" font-weight="800">Typ / Type</text>
  <rect x="44" y="160" width="512" height="64" rx="12" fill="#14331f" stroke="#34d058" stroke-width="3"/>
  <text x="66" y="201" fill="#7df09b" font-size="28" font-weight="800">Secret</text>
  <text x="524" y="201" fill="#7df09b" font-size="22">&#9662;</text>
  <text x="44" y="256" fill="#7df09b" font-size="22" font-weight="700">→ „Secret" wählen, nicht „Text"</text>

  <!-- Variablenname (HIGHLIGHT) -->
  <text x="44" y="306" fill="#7df09b" font-size="22" font-weight="800">Variablenname / Variable name</text>
  <rect x="44" y="320" width="512" height="66" rx="12" fill="#14331f" stroke="#34d058" stroke-width="3"/>
  <text x="66" y="363" fill="#7df09b" font-size="30" font-weight="800" font-family="monospace">SYNC_SECRET</text>

  <!-- Wert (HIGHLIGHT gold) -->
  <text x="44" y="436" fill="#ffd166" font-size="22" font-weight="800">Wert / Value</text>
  <rect x="44" y="450" width="512" height="64" rx="12" fill="#33290b" stroke="#ffd166" stroke-width="3"/>
  <text x="66" y="491" fill="#ffe39a" font-size="28" font-family="monospace">••••••••••••••••</text>
  <text x="44" y="546" fill="#ffd166" font-size="22" font-weight="700">→ in der App kopiertes Secret einfügen</text>
  <text x="44" y="578" fill="#c3d2ee" font-size="21">(darf nicht leer sein)</text>
</svg>
