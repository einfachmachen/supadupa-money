<svg xmlns="http://www.w3.org/2000/svg" width="640" height="430" viewBox="0 0 640 430" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="640" height="430" rx="14" fill="#0b1120"/>
  <text x="32" y="46" fill="#f2f5fa" font-size="17" font-weight="700">Worker-Code einfügen</text>
  <text x="32" y="64" fill="#8aa0c6" font-size="12">Edit code</text>

  <!-- Step 1 -->
  <circle cx="44" cy="104" r="13" fill="#3b82f6"/>
  <text x="44" y="109" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">1</text>
  <rect x="68" y="86" width="540" height="40" rx="9" fill="#111c33" stroke="#2b3b5e"/>
  <text x="84" y="105" fill="#f2f5fa" font-size="13.5">Button <tspan font-weight="700">Edit code</tspan> <tspan fill="#8aa0c6">(Code bearbeiten)</tspan> öffnen</text>
  <text x="84" y="120" fill="#8aa0c6" font-size="11">öffnet den Online-Editor</text>

  <!-- Step 2: editor with select-all + paste -->
  <circle cx="44" cy="200" r="13" fill="#34c759"/>
  <text x="44" y="205" fill="#06210f" font-size="13" font-weight="700" text-anchor="middle">2</text>
  <text x="68" y="160" fill="#9be7b4" font-size="12.5" font-weight="700">Alles markieren &amp; vorhandenen Code ersetzen</text>
  <rect x="68" y="170" width="400" height="92" rx="9" fill="#0f2a1b" stroke="#34c759" stroke-width="2"/>
  <text x="84" y="194" fill="#7fd39b" font-size="12" font-family="monospace">// vorhandenen Beispielcode löschen</text>
  <text x="84" y="214" fill="#9be7b4" font-size="12" font-family="monospace">Strg/Cmd + A  → markieren</text>
  <text x="84" y="234" fill="#9be7b4" font-size="12" font-family="monospace">Strg/Cmd + V  → eingefügter Code</text>
  <text x="84" y="252" fill="#7fd39b" font-size="12" font-family="monospace">(aus „Worker-Code kopieren")</text>

  <!-- Step 3: deploy -->
  <circle cx="44" cy="344" r="13" fill="#3b82f6"/>
  <text x="44" y="349" fill="#fff" font-size="13" font-weight="700" text-anchor="middle">3</text>
  <rect x="68" y="324" width="200" height="42" rx="9" fill="#3b82f6"/>
  <text x="168" y="351" fill="#fff" font-size="14.5" font-weight="700" text-anchor="middle">Deploy</text>
  <text x="288" y="350" fill="#8aa0c6" font-size="12.5">Bereitstellen — Code wird aktiv</text>
</svg>
