<svg xmlns="http://www.w3.org/2000/svg" width="600" height="540" viewBox="0 0 600 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="600" height="540" rx="16" fill="#0b1120"/>
  <text x="28" y="56" fill="#ffffff" font-size="38" font-weight="800">Code einfügen</text>
  <text x="28" y="88" fill="#c3d2ee" font-size="22">Edit code</text>

  <!-- Row 1 -->
  <circle cx="60" cy="152" r="24" fill="#3b82f6"/>
  <text x="60" y="161" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">1</text>
  <rect x="100" y="108" width="476" height="88" rx="14" fill="#18243d" stroke="#3a4d75" stroke-width="2"/>
  <text x="120" y="148" fill="#ffffff" font-size="28" font-weight="700">„Edit code" öffnen</text>
  <text x="120" y="180" fill="#c3d2ee" font-size="21">Code bearbeiten</text>

  <!-- Row 2 (highlight: select all + paste) -->
  <circle cx="60" cy="280" r="24" fill="#34d058"/>
  <text x="60" y="289" fill="#06210f" font-size="26" font-weight="800" text-anchor="middle">2</text>
  <rect x="100" y="212" width="476" height="136" rx="14" fill="#14331f" stroke="#34d058" stroke-width="3"/>
  <text x="120" y="254" fill="#7df09b" font-size="25" font-weight="700">Alten Code löschen,</text>
  <text x="120" y="290" fill="#7df09b" font-size="26" font-weight="800" font-family="monospace">Cmd/Strg + A</text>
  <text x="120" y="326" fill="#7df09b" font-size="26" font-weight="800" font-family="monospace">Cmd/Strg + V  (einfügen)</text>

  <!-- Row 3 (deploy) -->
  <circle cx="60" cy="420" r="24" fill="#3b82f6"/>
  <text x="60" y="429" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">3</text>
  <rect x="100" y="376" width="476" height="88" rx="14" fill="#3b82f6"/>
  <text x="338" y="416" fill="#ffffff" font-size="30" font-weight="800" text-anchor="middle">Deploy</text>
  <text x="338" y="446" fill="#dbe7ff" font-size="21" text-anchor="middle">Bereitstellen</text>
</svg>
