name: Deploy to GitHub Pages

# Veröffentlicht über den klassischen gh-pages-Branch (peaceiris/actions-gh-pages)
# statt über die neuere GitHub-Pages-"Deployments API" (actions/deploy-pages).
# Grund: die Deployments-API hing wiederholt in der Warteschlange fest
# ("deployment_queued" bis zum 10-Minuten-Timeout, teils auch sofortiges
# "Deployment cancelled") — ein GitHub-seitiges Problem, keine Fehlkonfiguration
# (Environment-Schutzregeln waren leer/Standard). Der gh-pages-Branch-Weg
# braucht diese API nicht und ist seit Jahren battle-tested.
#
# EINMALIGER Schritt nach diesem Workflow-Wechsel: In den Repo-Einstellungen
# unter Settings → Pages die "Source" von "GitHub Actions" auf
# "Deploy from a branch" (Branch: gh-pages, Ordner: /) umstellen.

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build app
        run: npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Assemble site
        run: |
          mkdir -p _site
          cp -r dist/* _site/
          echo "── Site-Inhalt ──"
          find _site -maxdepth 2 -type f | head -30

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: _site
          publish_branch: gh-pages
