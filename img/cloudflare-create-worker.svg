<svg xmlns="http://www.w3.org/2000/svg" width="600" height="540" viewBox="0 0 600 540" font-family="-apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif">
  <rect width="600" height="540" rx="16" fill="#0b1120"/>
  <text x="28" y="56" fill="#ffffff" font-size="38" font-weight="800">Worker anlegen</text>
  <text x="28" y="88" fill="#c3d2ee" font-size="22">Create Worker</text>

  <!-- Row 1 -->
  <circle cx="60" cy="152" r="24" fill="#3b82f6"/>
  <text x="60" y="161" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">1</text>
  <rect x="100" y="108" width="476" height="88" rx="14" fill="#18243d" stroke="#3a4d75" stroke-width="2"/>
  <text x="120" y="148" fill="#ffffff" font-size="28" font-weight="700">Menü „Workers &amp; Pages"</text>
  <text x="120" y="180" fill="#c3d2ee" font-size="21">Workers und Pages</text>

  <!-- Row 2 -->
  <circle cx="60" cy="256" r="24" fill="#3b82f6"/>
  <text x="60" y="265" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">2</text>
  <rect x="100" y="212" width="476" height="88" rx="14" fill="#18243d" stroke="#3a4d75" stroke-width="2"/>
  <text x="120" y="252" fill="#ffffff" font-size="28" font-weight="700">„Create" → „Worker"</text>
  <text x="120" y="284" fill="#c3d2ee" font-size="21">Erstellen → Worker</text>

  <!-- Row 3 (highlight name) -->
  <circle cx="60" cy="360" r="24" fill="#34d058"/>
  <text x="60" y="369" fill="#06210f" font-size="26" font-weight="800" text-anchor="middle">3</text>
  <rect x="100" y="316" width="476" height="88" rx="14" fill="#14331f" stroke="#34d058" stroke-width="3"/>
  <text x="120" y="356" fill="#7df09b" font-size="30" font-weight="800" font-family="monospace">supadupa-sync</text>
  <text x="120" y="388" fill="#7df09b" font-size="21">Name — frei wählbar</text>

  <!-- Row 4 (deploy) -->
  <circle cx="60" cy="464" r="24" fill="#3b82f6"/>
  <text x="60" y="473" fill="#fff" font-size="26" font-weight="800" text-anchor="middle">4</text>
  <rect x="100" y="420" width="476" height="88" rx="14" fill="#3b82f6"/>
  <text x="338" y="460" fill="#ffffff" font-size="30" font-weight="800" text-anchor="middle">Deploy</text>
  <text x="338" y="490" fill="#dbe7ff" font-size="21" text-anchor="middle">Bereitstellen</text>
</svg>
