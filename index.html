<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>MyBudgetTracker</title>

  <!-- PWA -->
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2C3035">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="MyBudgetTracker">
  <link rel="apple-touch-icon" href="icon-192.png">

  <script>
    // Service Worker
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => navigator.serviceWorker.register('sw.js').catch(()=>{}));
    }

    // Globale Error-Anzeige (wie im Original)
    window.addEventListener('error', function(e) {
      const msg = `CRASH: ${e.message} | File: ${e.filename} | Line: ${e.lineno} | Col: ${e.colno}`;
      document.title = msg;
      console.error(msg, e.error?.stack);
      const div = document.createElement('div');
      div.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;padding:10px;font:12px monospace;z-index:99999;white-space:pre-wrap;';
      div.textContent = msg + '\n\n' + (e.error?.stack || '');
      document.body?.appendChild(div);
    });
  </script>
</head>
<body>
  <div id="root"></div>
  <div id="loading">
    <svg width="52" height="52" viewBox="0 0 24 24" fill="none" stroke="#AACC00" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-bottom:12px">
      <line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/>
    </svg>
    <div style="font-size:16px;font-weight:700;letter-spacing:0.5px">MyBudgetTracker</div>
    <div style="font-size:12px;margin-top:4px;opacity:0.6">lädt…</div>
  </div>

  <script type="module" src="/src/main.jsx"></script>
</body>
</html>
